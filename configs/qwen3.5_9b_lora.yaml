# LLaMA-Factory QLoRA config for Qwen3.5-9B VLM (DCIC forgery analysis)
# Usage: place Qwen3.5-9B under DCIC/models/qwen3.5-9b, then run LLaMA-Factory with this config.
# Requires: pip install bitsandbytes

model_name_or_path: ./models/qwen3.5-9b
finetuning_type: lora
quantization_bit: 4
quantization_method: bitsandbytes
lora_rank: 64
lora_alpha: 128
lora_target: all

dataset: vlm_train
template: qwen3_vl

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
num_train_epochs: 3
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1

bf16: true
gradient_checkpointing: true

output_dir: ./checkpoints/qwen3.5-9b-lora
logging_steps: 1
save_steps: 100
save_total_limit: 3

# If using LLaMA-Factory from repo, point dataset_dir to DCIC/data and register vlm_train
# dataset_dir: ./data
